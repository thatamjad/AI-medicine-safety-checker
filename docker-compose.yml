version: '3.8'

services:
  ai-medicine-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./db/custom.db
    env_file:
      - .env.local
    volumes:
      - ./db:/app/db
    restart: unless-stopped

  # Optional: Add a database service if you want to use PostgreSQL instead of SQLite
